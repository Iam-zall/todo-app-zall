<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#4f46e5,#7c3aed);
    }

    .login-box{
      background:white;
      padding:40px;
      border-radius:20px;
      width:350px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h1{
      margin-bottom:25px;
      color:#4f46e5;
    }

    input{
      width:100%;
      padding:14px;
      margin-bottom:15px;
      border:1px solid #ddd;
      border-radius:10px;
      font-size:16px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#4f46e5;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      opacity:0.9;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h1>Masuk</h1>

    <input type="text" id="nameInput" placeholder="Masukkan nama">

    <button id="loginBtn">Masuk</button>
  </div>

  <script>
    const loginBtn = document.getElementById("loginBtn");

    loginBtn.addEventListener("click", () => {
      const name = document.getElementById("nameInput").value;

      if(name.trim() === ""){
        alert("Masukkan nama dulu");
        return;
      }

      localStorage.setItem("username", name);

      window.location.href = "index.html";
    });
  </script>

</body>
</html>S
